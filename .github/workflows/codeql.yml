---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "30 1 * * 0"
  merge_group:

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "python"]
    steps:
      - name: CodeQL Analysis
        uses: ivuorinen/actions/codeql-analysis@1264056e3fed44994ea50df4be7f963ba4b792c2 # v2026.06.27
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
